# Mint AI backend stack. Deploy: copy this file + .env to the server, then
#   docker login ghcr.io   (once, with a GitHub token that can read packages)
#   docker compose up -d
# .env must define DB_URL (host `db`, matching the POSTGRES_* values) plus the
# app secrets — see .env.example.

services:
  api:
    image: ghcr.io/jehoi-ga-ada/mint-ai:latest
    env_file: .env
    environment:
      # Composed here (overriding .env) so the same .env works for local runs
      # (DB_URL@localhost) and compose, where Postgres lives at `db`. The
      # password must be URL-safe; encode special characters if needed.
      DB_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set in .env, must match DB_URL}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env, must match DB_URL}
      POSTGRES_DB: ${POSTGRES_DB:?set in .env, must match DB_URL}
    volumes:
      # postgres:18 images keep data under /var/lib/postgresql (not .../data).
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
