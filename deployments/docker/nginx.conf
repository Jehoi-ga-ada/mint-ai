worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=chat:10m rate=30r/m;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    upstream api {
        server mint-backend:8080;
    }

    server {
        listen 80;
        server_name mintai.eastasia.cloudapp.azure.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name mintai.eastasia.cloudapp.azure.com;

        ssl_certificate /etc/letsencrypt/live/mintai.eastasia.cloudapp.azure.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mintai.eastasia.cloudapp.azure.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        limit_conn perip 20;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://api;
        }

        location /api/v1/chat/ {
            limit_req zone=chat burst=5 nodelay;
            client_max_body_size 40m;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_pass http://api;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            client_max_body_size 2m;
            proxy_pass http://api;
        }

        location / {
            return 404;
        }
    }
}
